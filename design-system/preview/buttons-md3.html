<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons — MD3</title>
<style>
  .mbtn { display:inline-flex; align-items:center; gap:8px; padding:10px 24px; border-radius:20px; font:500 14px/1 var(--font-android); letter-spacing:0.1px; border:none; cursor:pointer; }
  .mbtn-filled { background:#006C51; color:#fff; }
  .mbtn-tonal { background:#8FF8D3; color:#002116; }
  .mbtn-outlined { background:transparent; color:#006C51; border:1px solid #707973; }
  .mbtn-text { background:transparent; color:#006C51; padding:10px 12px; }
  .mbtn-icon { width:40px; height:40px; border-radius:100px; padding:0; justify-content:center; }
</style>
</head><body>
<div class="card" style="background:#FBFDF9; font-family:var(--font-android);">
  <div class="label" style="margin-bottom:12px;">Buttons · Material 3</div>
  <div class="row" style="margin-bottom:10px;">
    <button class="mbtn mbtn-filled">Connect Headband</button>
    <button class="mbtn mbtn-tonal">Sync Now</button>
    <button class="mbtn mbtn-outlined">Disconnect</button>
    <button class="mbtn mbtn-text">Manage Cabinet</button>
  </div>
  <div class="row">
    <button class="mbtn mbtn-filled mbtn-icon">+</button>
    <div style="font:500 12px/1.4 var(--font-android); color:#404943;">FAB · 40dp · corner 100%</div>
  </div>
</div>
</body></html>
