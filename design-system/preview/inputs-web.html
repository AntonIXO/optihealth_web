<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Inputs</title></head><body>
<div class="card-glass">
  <div class="label" style="color:rgba(255,255,255,0.7); margin-bottom:12px;">Fields · glass inputs with backdrop blur</div>
  <div style="display:grid; gap:10px;">
    <label style="display:block;">
      <span style="display:block; font:500 13px/1 var(--font-sans); margin-bottom:6px;">Email</span>
      <div style="display:flex; border-radius:12px; border:1px solid rgba(255,255,255,0.20); background:rgba(255,255,255,0.10); backdrop-filter:blur(12px); padding:10px 12px;">
        <input style="flex:1; background:transparent; border:none; outline:none; color:#fff; font:400 14px var(--font-sans);" placeholder="you@example.com" value="alex@optihealth.app">
      </div>
    </label>
    <label style="display:block;">
      <span style="display:block; font:500 13px/1 var(--font-sans); margin-bottom:6px;">Password</span>
      <div style="display:flex; align-items:center; border-radius:12px; border:1px solid rgba(255,255,255,0.40); background:rgba(255,255,255,0.10); backdrop-filter:blur(12px); padding:10px 12px;">
        <input type="password" style="flex:1; background:transparent; border:none; outline:none; color:#fff; font:400 14px var(--font-sans);" value="••••••••">
        <button style="background:transparent; border:none; color:rgba(255,255,255,0.8); font:500 12px var(--font-sans); cursor:pointer;">Show</button>
      </div>
    </label>
    <div style="display:flex; justify-content:space-between; align-items:center; font:400 13px var(--font-sans); color:rgba(255,255,255,0.8);">
      <label style="display:flex; gap:8px; align-items:center;"><input type="checkbox" checked> Remember me</label>
      <a style="color:rgba(255,255,255,0.9); text-decoration:underline;">Forgot password?</a>
    </div>
  </div>
</div>
</body></html>
