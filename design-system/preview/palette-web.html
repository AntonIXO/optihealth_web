<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Palette — Web</title></head><body>
<div class="card-glass">
  <div class="label" style="color:rgba(255,255,255,0.7); margin-bottom:14px;">Liquid glass · surfaces & foregrounds on indigo wash</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:14px;">
    <div style="height:68px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.10); backdrop-filter:blur(12px); border-radius:10px; padding:8px; font-size:11px;">white/5<br><span style="opacity:.6">nav</span></div>
    <div style="height:68px; background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.20); backdrop-filter:blur(12px); border-radius:10px; padding:8px; font-size:11px;">white/10<br><span style="opacity:.6">card</span></div>
    <div style="height:68px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.20); backdrop-filter:blur(12px); border-radius:10px; padding:8px; font-size:11px;">white/15<br><span style="opacity:.6">hover</span></div>
    <div style="height:68px; background:rgba(255,255,255,0.20); border:1px solid rgba(255,255,255,0.20); backdrop-filter:blur(12px); border-radius:10px; padding:8px; font-size:11px;">white/20<br><span style="opacity:.6">CTA</span></div>
  </div>
  <div style="display:flex; gap:8px; margin-bottom:14px;">
    <div style="color:#fff">fg 100</div><div style="color:rgba(255,255,255,0.8)">fg 80</div><div style="color:rgba(255,255,255,0.7)">fg 70</div><div style="color:rgba(255,255,255,0.5)">fg 50</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(6,1fr); gap:8px;">
    <div style="height:44px; background:#60a5fa; border-radius:8px; font-size:10px; padding:6px; color:#0b2744;">blue-400<br>Activity</div>
    <div style="height:44px; background:#c084fc; border-radius:8px; font-size:10px; padding:6px; color:#32104a;">purple-400<br>Brain</div>
    <div style="height:44px; background:#4ade80; border-radius:8px; font-size:10px; padding:6px; color:#083d21;">green-400<br>Trend</div>
    <div style="height:44px; background:#f87171; border-radius:8px; font-size:10px; padding:6px; color:#450a0a;">red-400<br>Heart</div>
    <div style="height:44px; background:#facc15; border-radius:8px; font-size:10px; padding:6px; color:#422006;">yellow-400<br>Shield</div>
    <div style="height:44px; background:#fb923c; border-radius:8px; font-size:10px; padding:6px; color:#431407;">orange-400<br>Zap</div>
  </div>
</div>
</body></html>
