<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Iconography</title></head><body>
<div class="card">
  <div class="label" style="margin-bottom:10px;">Web · Lucide · stroke 2 · 20-24px · mapped to feature concepts</div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; margin-bottom:18px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; font:500 10px var(--font-sans); color:#666;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Activity</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; font:500 10px var(--font-sans); color:#666;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-5 0 2.5 2.5 0 0 1-3-3 3 3 0 0 1 0-6 2.5 2.5 0 0 1 1.3-4.3 2.5 2.5 0 0 1 2-3A2.5 2.5 0 0 1 9.5 2Z"/></svg>Brain</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; font:500 10px var(--font-sans); color:#666;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>TrendingUp</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; font:500 10px var(--font-sans); color:#666;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l8.84 8.84 8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>Heart</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; font:500 10px var(--font-sans); color:#666;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Shield</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; font:500 10px var(--font-sans); color:#666;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Zap</div>
  </div>
  <div class="label" style="margin-bottom:10px;">Android · Material Symbols / Icons.Filled · 24-28dp · tint primary</div>
  <div style="display:flex; gap:16px; color:#006C51; font-family:var(--font-android); font-size:12px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><span style="font-size:26px;">＋</span>Add</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><span style="font-size:26px;">↻</span>Refresh</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><span style="font-size:26px;">📅</span>DateRange</div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><span style="font-size:26px;">●</span>Face</div>
  </div>
</div>
</body></html>
