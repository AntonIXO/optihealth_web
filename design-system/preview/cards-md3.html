<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Cards — MD3</title></head><body>
<div class="card" style="background:#FBFDF9; font-family:var(--font-android);">
  <div class="label" style="margin-bottom:12px;">Material card · corner 8dp · elevation 1</div>
  <div style="padding:16px; border-radius:8px; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);">
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; color:#006C51; font-size:22px;">🜛</span>
      <span class="md-title-md" style="color:#191C1A;">Neiry Headband</span>
    </div>
    <div style="display:flex; gap:8px; margin-top:14px;">
      <button style="flex:1; padding:10px; border:none; border-radius:8px; background:#006C51; color:#fff; font:500 14px var(--font-android); letter-spacing:0.1px;">Connect Headband</button>
      <button style="flex:1; padding:10px; border:1px solid #707973; border-radius:8px; background:transparent; color:#006C51; font:500 14px var(--font-android);">Disconnect</button>
    </div>
    <div class="md-body-sm" style="margin-top:10px; color:#404943;">Connect to your Neiry BCI headband and print heart rate to logs.</div>
  </div>
</div>
</body></html>
