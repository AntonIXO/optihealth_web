<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Palette — MD3</title></head><body>
<div class="card" style="background:#FBFDF9; font-family:var(--font-android);">
  <div class="label" style="margin-bottom:12px;">Android · Material 3 tonal · green-forward</div>
  <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:6px; margin-bottom:10px;">
    <div style="height:56px; background:#006C51; color:#fff; padding:8px; font-size:11px; border-radius:6px;">primary<br>#006C51</div>
    <div style="height:56px; background:#8FF8D3; color:#002116; padding:8px; font-size:11px; border-radius:6px;">primary container<br>#8FF8D3</div>
    <div style="height:56px; background:#4C6358; color:#fff; padding:8px; font-size:11px; border-radius:6px;">secondary<br>#4C6358</div>
    <div style="height:56px; background:#3D6374; color:#fff; padding:8px; font-size:11px; border-radius:6px;">tertiary<br>#3D6374</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:6px; margin-bottom:10px;">
    <div style="height:44px; background:#CEE9DA; color:#092017; padding:8px; font-size:11px; border-radius:6px;">sec container</div>
    <div style="height:44px; background:#C1E8FC; color:#001F2A; padding:8px; font-size:11px; border-radius:6px;">tert container</div>
    <div style="height:44px; background:#DCE5DD; color:#404943; padding:8px; font-size:11px; border-radius:6px;">surface variant</div>
    <div style="height:44px; background:#BA1A1A; color:#fff; padding:8px; font-size:11px; border-radius:6px;">error</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:6px;">
    <div style="height:40px; background:#FBFDF9; color:#191C1A; padding:8px; font-size:11px; border-radius:6px; border:1px solid #DCE5DD;">surface · #FBFDF9</div>
    <div style="height:40px; background:#191C1A; color:#E1E3DF; padding:8px; font-size:11px; border-radius:6px;">on-bg · #191C1A</div>
    <div style="height:40px; background:#707973; color:#fff; padding:8px; font-size:11px; border-radius:6px;">outline · #707973</div>
  </div>
</div>
</body></html>
